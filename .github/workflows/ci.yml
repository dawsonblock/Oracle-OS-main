name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Check repo hygiene
        run: |
          # Fail if unexpected executable scripts appear at root
          FORBIDDEN=$(find . -maxdepth 1 \( -name "*.py" -o -name "*.js" -o -name "*.sh" \) -type f 2>/dev/null | wc -l)
          if [ "$FORBIDDEN" -gt 0 ]; then
            echo "ERROR: Found $FORBIDDEN executable script(s) at repo root"
            find . -maxdepth 1 \( -name "*.py" -o -name "*.js" -o -name "*.sh" \) -type f
            exit 1
          fi
          echo "✓ Root hygiene check passed"

      - name: Test
        run: swift test
