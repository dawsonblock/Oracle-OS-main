name: Oracle Controller Release

on:
  pull_request:
    paths:
      - "AppResources/**"
      - "Sources/**"
      - "scripts/build-controller-app.sh"
      - "scripts/create-controller-dmg.sh"
      - "scripts/notarize-controller-release.sh"
      - ".github/workflows/controller-release.yml"
      - "Package.swift"
      - "Package.resolved"
  push:
    branches:
      - main
      - oracle-operator-upgrade
    tags:
      - "v*"
    paths:
      - "AppResources/**"
      - "Sources/**"
      - "scripts/build-controller-app.sh"
      - "scripts/create-controller-dmg.sh"
      - "scripts/notarize-controller-release.sh"
      - ".github/workflows/controller-release.yml"
      - "Package.swift"
      - "Package.resolved"
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Build app bundle
        run: ./scripts/build-controller-app.sh --configuration release --skip-sign

      - name: Build DMG
        run: ./scripts/create-controller-dmg.sh --configuration release --skip-sign

      - name: Upload unsigned DMG
        uses: actions/upload-artifact@v4
        with:
          name: oracle-controller-dmg-preview
          path: dist/Oracle-Controller-*.dmg

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: validate
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ -z "${APPLE_CERTIFICATE_P12_BASE64}" || -z "${APPLE_CERTIFICATE_PASSWORD}" ]]; then
            echo "Developer ID certificate secrets are required for tagged releases." >&2
            exit 1
          fi
          CERT_PATH="$RUNNER_TEMP/oracle-controller-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/oracle-controller.keychain-db"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"

      - name: Prepare notary API key
        env:
          APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
        run: |
          if [[ -z "${APPLE_NOTARY_KEY_P8_BASE64}" ]]; then
            echo "Notary API key secret is required for tagged releases." >&2
            exit 1
          fi
          echo "$APPLE_NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Build signed app bundle
        env:
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          ORACLE_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/build-controller-app.sh --configuration release --build-number "$ORACLE_BUILD_NUMBER"

      - name: Build signed DMG
        env:
          APPLE_DEVELOPER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          ORACLE_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/create-controller-dmg.sh --configuration release --build-number "$ORACLE_BUILD_NUMBER"

      - name: Notarize app bundle
        env:
          APPLE_NOTARY_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: ./scripts/notarize-controller-release.sh "dist/Oracle Controller.app"

      - name: Notarize DMG
        env:
          APPLE_NOTARY_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: ./scripts/notarize-controller-release.sh dist/Oracle-Controller-*.dmg

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: oracle-controller-release
          path: |
            dist/Oracle Controller.app
            dist/Oracle-Controller-*.dmg
