name: Architecture Guard

permissions:
  contents: read

on:
  pull_request:
  push:

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Architecture Guard
        run: python scripts/architecture_guard.py
